<h2>今月の休日</h2>
<div id="holiday-announcement">
 <img src="images/images/休業日/2026年4月.jpg width="378" height="580" alt="2026年4月の休業日">
</div>

<h2>アクセス</h2>
<div class="map-container"> 
  <iframe src="https://www.google.com/maps/embed?pb=..." width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</div>

<div id="access">

  <p>住所　宮城県牡鹿郡女川町女川2丁目5-10</p>

<footer>
  <p><small>Copyright 2026 daishin-and-cafesakura All rights reserved.</small></p>
</footer>

<script>
  // 休日情報の読み込み
  fetch('closed_day.txt')
    .then(response => response.text())
    .then(data => {
      const element = document.getElementById('holiday-announcement');
      if (element) element.innerText = data;
    })
    .catch(error => {
      const element = document.getElementById('holiday-announcement');
      if (element) element.innerText = "休日の取得に失敗しました。";
    });

  // ハンバーガーメニュー制御
  const hamburger = document.getElementById('js-hamburger');
  const navigation = document.getElementById('js-navigation');
  const menuClose = document.getElementById('js-menu-close');
  const menuLinks = document.querySelectorAll('.navigation a');

  if (hamburger && navigation && menuClose) {
    hamburger.addEventListener('click', () => {
      navigation.classList.add('active');
      hamburger.classList.add('hidden');
    });

    menuClose.addEventListener('click', () => {
      navigation.classList.remove('active');
      hamburger.classList.remove('hidden');
    });

    menuLinks.forEach(link => {
      link.addEventListener('click', () => {
        navigation.classList.remove('active');
        hamburger.classList.remove('hidden');
      });
    });
  }
</script>
</body>
